name: Monitor Bandi Teatrali Scuole Torino

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ripristina storico
        uses: actions/cache@v4
        with:
          path: bandi_notificati.json
          key: storico-${{ runner.os }}-${{ github.run_id }}
          restore-keys: storico-${{ runner.os }}-

      - name: Esegui monitoraggio
        env:
          EMAIL_MITTENTE: ${{ secrets.EMAIL_MITTENTE }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
        run: python monitor_scuole.py
